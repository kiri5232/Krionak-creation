<!DOCTYPE html>
<html>
<head>
  <title>Secret Mission 😏</title>
  <title>mere naam ka first 2 ✉️ # aur 7 ka use</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: black;
      color: white;
    }

    .page {
      display: none;
      padding-top: 100px;
    }

    #page1 {
      display: block;
    }

    input, button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 10px;
      cursor: pointer;
    }

    /* 😏 PAGE 2 (UPDATED) */
    #page2 {
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #ff9a9e, #a18cd1, #89f7fe);
    }

    #page2Content {
      position: relative;
      z-index: 2;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      width: 80%;
      margin: auto;
    }

    button {
      border-radius: 10px;
      border: none;
      background: #ff6fa5;
      color: white;
      box-shadow: 0 0 10px #ff6fa5;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #ff6fa5;
    }

    #noBtn {
      position: absolute;
    }

    /* ✨ particles */
    .particle {
      position: absolute;
      width: 5px;
      height: 5px;
      background: white;
      border-radius: 50%;
      opacity: 0.5;
    }

    /* 🌌 PAGE 3 same */
    #page3 {
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: radial-gradient(circle at center, #0a0f2c, #000000);
    }

    .star {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 8px white;
    }
  </style>
</head>

<body>

<!-- 🔐 PAGE 1 (UNCHANGED) -->
<div id="page1" class="page">
  <h1>🔐 Secret Entry</h1>
  <p>Password dalo 👀</p>

  <input type="password" id="pass">
  <br>
  <button onclick="checkPass()">Unlock 😏</button>

  <p id="msg"></p>
</div>

<!-- 😏 PAGE 2 (ONLY THIS MODIFIED) -->
<div id="page2" class="page">

  <div id="page2Content">
    <h2>Ek important sawal 😌</h2>
    <p>Tonu sundar aur acha bacha hai?</p>

    <button onclick="goNext()">YES 😎</button>
    <button id="noBtn">NO 😈</button>
  </div>

</div>

<!-- 🎁 PAGE 3 (UNCHANGED) -->
<div id="page3" class="page">
  <h1>🎉 Correct Choice 😏</h1>
  <p>Clue: “Jahan hum sabse zyada time waste karte the 👀”</p>
</div>

<script>

// 🔐 Password Check
function checkPass() {
  var p = document.getElementById("pass").value;

  if(p === "tosu") {
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";
    createParticles();
  } else {
    document.getElementById("msg").innerText = "❌ Galat hai... snehu itna aasan password h wo bhi galat? sawas!😈";
  }
}

// YES → next page
function goNext() {
  document.getElementById("page2").style.display = "none";
  document.getElementById("page3").style.display = "block";
  startGalaxy();
}

// 😈 NO button (FIXED FOR MOBILE + UNLIMITED MOVE)
var no = document.getElementById("noBtn");

function moveNoBtn() {
  let maxX = window.innerWidth - no.offsetWidth;
  let maxY = window.innerHeight - no.offsetHeight;

  let x = Math.random() * maxX;
  let y = Math.random() * maxY;

  no.style.left = x + "px";
  no.style.top = y + "px";
}

// hover (PC)
no.addEventListener("mouseover", moveNoBtn);

// touch (PHONE)
no.addEventListener("touchstart", function(e){
  e.preventDefault();
  moveNoBtn();
});

// ✨ particles
function createParticles(){
  let page2 = document.getElementById("page2");

  for(let i=0; i<40; i++){
    let p = document.createElement("div");
    p.className = "particle";

    p.style.left = Math.random()*window.innerWidth + "px";
    p.style.top = Math.random()*window.innerHeight + "px";

    page2.appendChild(p);

    setInterval(()=>{
      let top = parseFloat(p.style.top);
      p.style.top = (top - 0.3) + "px";

      if(top < 0){
        p.style.top = window.innerHeight + "px";
      }
    }, 40);
  }
}

// 🌌 Galaxy (UNCHANGED)
function startGalaxy(){
  let page3 = document.getElementById("page3");

  let messages = [
    "😂 Pakdi gayi tum!",
  "😏 Itna curiosity kyun hai?",
  "👀 Secret jaan na hai kya?",
  "💖 Bestfriend privilege unlocked",
  "😂 Ye click karne ki zarurat thi kya?",
  "😜 Tum sudhrogi nahi kabhi",
  "✨ Ye bas ek chhota sa trap tha",
  "😏 Ab hasi aayi kya?",
  "💫 Yaad hai purane din?",
  "😂 Tum waise hi ho bilkul",
  "😌 Good choice waise",
  "👀 Ab next kya karegi?",
  "😜 Tumko tang karna zaruri tha",
  "💖 Tum alag ho thodi si",
  "😂 Ye addictive hai na?",
  "😏 Aur click karo aur",
  "👀 Main dekh raha hu sab",
  "😄 Has rahi ho na?",
  "💫 Ye moment save ho gaya",
  "😜 Bas ab phone rakh do 😂"
  ];

  for(let i=0; i<120; i++){
    let star = document.createElement("div");
    star.className = "star";

    star.style.top = Math.random() * window.innerHeight + "px";
    star.style.left = Math.random() * window.innerWidth + "px";

    star.onclick = function(){
      let msg = messages[Math.floor(Math.random()*messages.length)];
      alert(msg);
    }

    page3.appendChild(star);
  }
}

</script>

</body>
</html>
