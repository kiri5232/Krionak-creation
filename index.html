<!DOCTYPE html>
<html>
<head>
  <title>Secret Mission 😏</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      color: white;
    }

    .page {
      display: none;
      padding-top: 100px;
      height: 100vh;
    }

    #page1 {
      display: block;
      background: black;
    }

    input, button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 10px;
      cursor: pointer;
      border-radius: 12px;
      border: none;
    }

    /* 🌸 PAGE 2 BACKGROUND */
    #page2 {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #ff9a9e, #a18cd1, #89f7fe);
    }

    /* ✨ Floating particles */
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      opacity: 0.6;
    }

    /* 💎 Glass Effect */
    #page2Content {
      position: relative;
      z-index: 2;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      width: 80%;
      margin: auto;
    }

    /* 💖 Buttons */
    button {
      background: #ff6fa5;
      color: white;
      box-shadow: 0 0 10px #ff6fa5;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px #ff6fa5;
    }

    #noBtn {
      position: absolute;
    }

    /* 🌌 PAGE 3 */
    #page3 {
      background: radial-gradient(circle at center, #0a0f2c, #000000);
    }

  </style>
</head>

<body>

<!-- 🔐 PAGE 1 -->
<div id="page1" class="page">
  <h1>🔐 Secret Entry</h1>
  <p>Password dalo 👀</p>

  <input type="password" id="pass">
  <br>
  <button onclick="checkPass()">Unlock 😏</button>

  <p id="msg"></p>
</div>

<!-- 😏 PAGE 2 -->
<div id="page2" class="page">

  <!-- 💎 Content -->
  <div id="page2Content">
    <h2>Ek chhota sa sawal 😌</h2>
    <p>Tumhe surprises pasand hai?</p>

    <button onclick="goNext()">YES 😊</button>
    <button id="noBtn">NO 😅</button>
  </div>

</div>

<!-- 🎁 PAGE 3 -->
<div id="page3" class="page">
  <h1>✨ Surprise ✨</h1>
  <p>
    Sach bolu… 👀<br><br>
    Ye bas ek chhota sa fun tha 😅<br>
    Bas dekhna tha tum smile karti ho ya nahi 😊<br><br>
    Agar smile aayi…<br>
    to mission successful 💖
  </p>
</div>

<script>

// 🔐 Password
function checkPass() {
  var p = document.getElementById("pass").value;

  if(p === "rayzen123") {
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";
    createParticles();
  } else {
    document.getElementById("msg").innerText = "❌ Galat hai... try again 😈";
  }
}

// NEXT
function goNext() {
  document.getElementById("page2").style.display = "none";
  document.getElementById("page3").style.display = "block";
}

// 😈 NO Button move
var no = document.getElementById("noBtn");

no.addEventListener("mouseover", function() {
  var x = Math.random() * (window.innerWidth - 100);
  var y = Math.random() * (window.innerHeight - 100);

  no.style.left = x + "px";
  no.style.top = y + "px";
});

// ✨ Particles
function createParticles(){
  let page2 = document.getElementById("page2");

  for(let i=0; i<50; i++){
    let p = document.createElement("div");
    p.className = "particle";

    p.style.left = Math.random()*window.innerWidth + "px";
    p.style.top = Math.random()*window.innerHeight + "px";

    page2.appendChild(p);

    animateParticle(p);
  }
}

function animateParticle(p){
  let speed = Math.random()*0.5 + 0.2;

  setInterval(()=>{
    let top = parseFloat(p.style.top);
    p.style.top = (top - speed) + "px";

    if(top < 0){
      p.style.top = window.innerHeight + "px";
    }

  }, 30);
}

</script>

</body>
</html>
